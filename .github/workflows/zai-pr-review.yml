name: Z.ai PR Review (Hermes compatibility)

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to review.
        required: true
        type: string
      prompt_path:
        description: Repository-local review prompt path.
        required: false
        type: string
        default: .github/zai-review-prompt.md
      model:
        description: Deprecated. Hermes uses the model configured by hermes-pr-review.yml.
        required: false
        type: string
        default: ""
      haiku_model:
        description: Deprecated compatibility input, ignored by Hermes.
        required: false
        type: string
        default: ""
      runner_labels:
        description: JSON array of self-hosted runner labels.
        required: false
        type: string
        default: '["self-hosted","vps-hermes"]'
      api_timeout_ms:
        description: Deprecated compatibility input, ignored by Hermes.
        required: false
        type: string
        default: ""
      allowed_tools:
        description: Deprecated compatibility input, ignored by Hermes.
        required: false
        type: string
        default: ""
      approve_when_clean:
        description: Submit an approving review when no blocking issue is found.
        required: false
        type: boolean
        default: false
    secrets:
      ZAI_API_KEY:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    uses: midagedev/review-actions/.github/workflows/hermes-pr-review.yml@v5
    with:
      pr_number: ${{ inputs.pr_number }}
      prompt_path: ${{ inputs.prompt_path }}
      runner_labels: ${{ inputs.runner_labels }}
      approve_when_clean: ${{ inputs.approve_when_clean }}
